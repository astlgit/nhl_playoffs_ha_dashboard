resources:
  - url: /hacsfiles/button-card/button-card.js
    type: module
  - url: /hacsfiles/layout-card/layout-card.js
    type: module

panel: true
cards:
  - type: grid
    columns: 5
    square: false
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            entity: sensor.playoffs_r1_west_1
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              score: |
                [[[
                  return states['sensor.playoffs_r1_west_1'].attributes.series_status;
                ]]]
              l1: |
                [[[
                  const logo = states['sensor.playoffs_r1_west_1'].attributes.team1_logo;
                  return `<img src="${logo}" height="60">`;
                ]]]
              l2: |
                [[[
                  const logo = states['sensor.playoffs_r1_west_1'].attributes.team2_logo;
                  return `<img src="${logo}" height="60">`;
                ]]]
              s1: |
                [[[
                  return states['sensor.playoffs_r1_west_1'].attributes.team1_seed;
                ]]]
              s2: |
                [[[
                  return states['sensor.playoffs_r1_west_1'].attributes.team2_seed;
                ]]]
              n1: |
                [[[
                  const full = states['sensor.playoffs_r1_west_1'].attributes.team1_name || "";
                  const parts = full.trim().split(" ");
                  return parts[parts.length - 1];   // nickname only
                ]]]
              n2: |
                [[[
                  const full = states['sensor.playoffs_r1_west_1'].attributes.team2_name || "";
                  const parts = full.trim().split(" ");
                  return parts[parts.length - 1];   // nickname only
                ]]]
            styles:
              card:
                - border: 1px solid rgba(255,255,255,0.35)
                - border-radius: 14px
                - padding: 8px
                - height: 150px
                - display: flex
                - flex-direction: column
                - justify-content: center
                - align-items: center
                - background: rgba(0,0,0,0.2)
              grid:
                - grid-template-areas: |
                    "score score score"
                    "l1 . l2"
                    "s1 . s2"
                    "n1 . n2"
                - grid-template-columns: 1fr min-content 1fr
                - grid-template-rows: auto auto auto auto
              custom_fields:
                score:
                  - grid-area: score
                  - font-size: 18px
                  - font-weight: bold
                  - color: white
                  - text-align: center
                  - margin-bottom: 4px
                l1:
                  - grid-area: l1
                  - justify-self: center
                l2:
                  - grid-area: l2
                  - justify-self: center
                s1:
                  - grid-area: s1
                  - font-size: 13px
                  - color: white
                  - justify-self: center
                s2:
